<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Founder OS — Dashboard Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #071a2e;
      color: #e6edf3;
      min-height: 100vh;
    }
    .demo-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(7,26,46,0.95);
      border-bottom: 1px solid #1e5c82;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(8px);
    }
    .demo-bar-left { display: flex; align-items: center; gap: 16px; }
    .demo-badge {
      background: #f0883e;
      color: #000;
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .demo-label {
      font-size: 0.78rem;
      color: #5d8aa8;
    }
    .demo-label strong { color: #e6edf3; }
    .back-link {
      color: #5d8aa8;
      text-decoration: none;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-link:hover { color: #00bcd4; }
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 600;
      color: #00bcd4;
      text-decoration: none;
    }
    .logo span { color: #5d8aa8; font-weight: 400; }
    .screenshot-wrap {
      padding-top: 52px;
      min-height: 100vh;
    }
    .screenshot-wrap img {
      width: 100%;
      height: calc(100vh - 52px);
      object-fit: cover;
      display: block;
    }
    .demo-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(7,26,46,0.9);
      border-top: 1px solid #1e5c82;
      padding: 10px 20px;
      display: flex;
      justify-content: center;
      gap: 24px;
      backdrop-filter: blur(8px);
    }
    .demo-footer span {
      font-size: 0.72rem;
      color: #5d8aa8;
      font-family: 'JetBrains Mono', monospace;
    }
    .demo-footer strong { color: #26c6da; }
  </style>
</head>
<body>

<div class="demo-bar">
  <div class="demo-bar-left">
    <a href="/" class="back-link">← Back</a>
    <a href="/" class="logo">clawgentic<span>.os</span></a>
    <span class="demo-badge">DEMO</span>
    <span class="demo-label"><strong>Clawgentic</strong> · Board View · 22 Tasks</span>
  </div>
  <div class="demo-bar-left">
    <span class="demo-label">Live Dashboard — <strong>Max</strong> responds in real-time</span>
  </div>
</div>

<div class="screenshot-wrap">
  <img src="demo-dashboard.png" alt="Founder OS Dashboard Demo">
</div>

<div class="demo-footer">
  <span>⚡ <strong>4 Projects</strong></span>
  <span>📋 <strong>22 Tasks</strong></span>
  <span>💬 <strong>Max online</strong></span>
  <span>🔒 <strong>Private — your data stays on your server</strong></span>
</div>

</body>
</html>
