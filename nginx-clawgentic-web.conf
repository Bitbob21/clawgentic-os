server {
    listen 80;
    server_name clawgentic.co.nz clawgentic.co www.clawgentic.co.nz 204.168.190.201;

    root /var/www/clawgentic-web;
    index index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
